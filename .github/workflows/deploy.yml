name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images (all 4 services in parallel)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, bot, engine, miniapp]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/kopix-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/kopix-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ---------------------------------------------------------------------------
  # Deploy to production server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/"
          target: "/opt/kopix/"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/kopix

            # Write .env from GitHub secret (base64-encoded full .env file)
            echo "${{ secrets.PROD_ENV_B64 }}" | base64 -d > infra/compose/.env

            # Override image tag to deployed SHA
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPO=${{ github.repository_owner }}

            # Pull latest images
            docker compose -f infra/compose/docker-compose.prod.yml pull

            # Restart with zero-downtime approach (replace one at a time)
            docker compose -f infra/compose/docker-compose.prod.yml up -d --remove-orphans

            # Wait for API health check to pass
            echo "Waiting for API to become healthy..."
            timeout 120 sh -c 'until docker compose -f infra/compose/docker-compose.prod.yml ps api | grep -q "(healthy)"; do sleep 3; done'

            echo "Deployment complete — sha=${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment FAILED for ${{ github.sha }}" >&2
