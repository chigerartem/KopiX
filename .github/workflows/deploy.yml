name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images (all 4 services in parallel)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, bot, engine, miniapp]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/kopix-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/kopix-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ---------------------------------------------------------------------------
  # Deploy to production server
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Fail fast if any secret is missing — avoids partial deploys where
      # the .env lands on the server but the webhook registration silently
      # skips, leaving the bot unreachable.
      - name: Validate required secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          PROD_ENV_B64: ${{ secrets.PROD_ENV_B64 }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_WEBHOOK_SECRET: ${{ secrets.BOT_WEBHOOK_SECRET }}
        run: |
          missing=()
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY PROD_ENV_B64 \
                     GHCR_PAT APP_DOMAIN TELEGRAM_BOT_TOKEN BOT_WEBHOOK_SECRET; do
            eval "val=\${$var:-}"
            if [ -z "$val" ]; then missing+=("$var"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: missing required GitHub Secrets: ${missing[*]}" >&2
            echo "See docs/DEPLOY.md for the full list." >&2
            exit 1
          fi
          echo "All required secrets present."

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/"
          target: "/opt/kopix/"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/kopix

            # Write .env from GitHub secret (base64-encoded full .env file)
            echo "${{ secrets.PROD_ENV_B64 }}" | base64 -d > infra/compose/.env

            # Authenticate with ghcr.io to pull private packages
            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Pin exact SHA that was just built
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPO=${{ github.repository_owner }}

            # Pull new images before stopping old containers (minimise downtime)
            docker compose -f infra/compose/docker-compose.prod.yml pull

            # Replace containers
            docker compose -f infra/compose/docker-compose.prod.yml up -d --remove-orphans

            # Wait for API health check
            echo "Waiting for API to become healthy..."
            timeout 120 sh -c 'until docker compose -f infra/compose/docker-compose.prod.yml ps api | grep -q "(healthy)"; do sleep 3; done'

            # Clean up dangling images to avoid disk fill over time
            docker image prune -f --filter "until=72h"

            echo "Deployment complete — sha=${{ github.sha }}"

      # Register Telegram webhook after every deploy so the URL stays current.
      # Re-registering the same URL is a no-op, so this is safe to run always.
      - name: Register Telegram webhook
        shell: bash
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_WEBHOOK_SECRET: ${{ secrets.BOT_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          # Fail fast if any required secret is missing — prevents silent
          # registration of a broken URL or with an empty token.
          : "${APP_DOMAIN:?APP_DOMAIN secret is not set}"
          : "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN secret is not set}"
          : "${BOT_WEBHOOK_SECRET:?BOT_WEBHOOK_SECRET secret is not set}"

          WEBHOOK_URL="https://${APP_DOMAIN}/api/bot/webhook"

          RESPONSE=$(curl -fsSL \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            --data-urlencode "url=${WEBHOOK_URL}" \
            --data-urlencode "secret_token=${BOT_WEBHOOK_SECRET}" \
            -d "allowed_updates=[\"message\",\"callback_query\"]")

          echo "Telegram response: ${RESPONSE}"

          # Verify ok=true in the JSON response
          echo "${RESPONSE}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if not d.get('ok'):
              print('setWebhook FAILED:', d, file=sys.stderr)
              sys.exit(1)
          print('Webhook registered:', d.get('description', 'ok'))
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment FAILED for ${{ github.sha }}" >&2
