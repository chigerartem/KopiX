global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "telegram"

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token: "${TELEGRAM_ALERTMANAGER_BOT_TOKEN}"
        chat_id: ${TELEGRAM_ALERTMANAGER_CHAT_ID}
        message: |
          {{ range .Alerts }}
          *{{ .Labels.alertname }}* [{{ .Labels.severity | toUpper }}]
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
        parse_mode: "Markdown"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
