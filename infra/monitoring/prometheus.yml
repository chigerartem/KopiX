global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["api:3000"]
    metrics_path: /metrics

  - job_name: "engine"
    static_configs:
      - targets: ["engine:9090"]
    metrics_path: /metrics
