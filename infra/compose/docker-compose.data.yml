# Data-layer only: Postgres + Redis.
#
# Daily app deploys do NOT touch this file. Apps run natively on the host via pm2
# (see /ecosystem.config.cjs). This compose is started once at VPS setup and left
# running. Restart only for version upgrades or config changes.
#
# Start:   docker compose -f infra/compose/docker-compose.data.yml up -d
# Status:  docker compose -f infra/compose/docker-compose.data.yml ps
# Stop:    docker compose -f infra/compose/docker-compose.data.yml down
#
# Ports are bound to 127.0.0.1 so the services are reachable only from the host
# (same machine pm2 runs on) — never exposed publicly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: kopix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kopix
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kopix"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kopix-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PgBouncer — connection pooler in transaction mode.
  #
  # Apps connect to 127.0.0.1:6432 (PgBouncer) instead of 5432 (Postgres
  # directly). Postgres can comfortably handle ~100 concurrent connections;
  # at 5000 active subscribers, the engine alone (parallel queries during
  # signal processing) plus the api (one per request) would exhaust that
  # quickly. PgBouncer multiplexes ~thousands of client connections onto
  # ~25 server connections.
  #
  # IMPORTANT: when DATABASE_URL points at this pooler, append
  # ?pgbouncer=true&connection_limit=1 so Prisma disables prepared
  # statements (incompatible with transaction-mode pooling) and stops
  # opening its own per-instance pool on top.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: kopix-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: kopix
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      AUTH_TYPE: scram-sha-256
    ports:
      - "127.0.0.1:6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
