services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kopix
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kopix"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  pgbouncer:
    image: pgbouncer/pgbouncer:1.23.1
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: kopix
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_AUTH_TYPE: plain
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/${GITHUB_REPO}/kopix-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/kopix
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: info
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_DOMAIN: ${APP_DOMAIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CORS_ORIGIN: https://${APP_DOMAIN}
      CRYPTOBOT_API_TOKEN: ${CRYPTOBOT_API_TOKEN}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  bot:
    image: ghcr.io/${GITHUB_REPO}/kopix-bot:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/kopix
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET}
      WEBHOOK_URL: https://${APP_DOMAIN}/api/bot/webhook
      MINIAPP_URL: https://${APP_DOMAIN}
      LOG_LEVEL: info
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [internal]

  engine:
    image: ghcr.io/${GITHUB_REPO}/kopix-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Single instance only — multiple replicas cause duplicate orders
    deploy:
      replicas: 1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/kopix
      REDIS_URL: redis://redis:6379
      MASTER_API_KEY: ${MASTER_API_KEY}
      MASTER_API_SECRET: ${MASTER_API_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      LOG_LEVEL: info
      METRICS_PORT: 9090
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [internal]

  miniapp:
    image: ghcr.io/${GITHUB_REPO}/kopix-miniapp:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Reverse proxy / TLS termination
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ../../infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - miniapp
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ../../infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    networks: [internal]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ../../infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [internal]

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    networks: [internal]

  # ---------------------------------------------------------------------------
  # Backup (daily pg_dump to S3)
  # ---------------------------------------------------------------------------
  backup:
    image: alpine:3.19
    restart: unless-stopped
    # Install deps, register daily 02:00 UTC cron, then start crond in foreground
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache postgresql-client aws-cli
        echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root
        exec crond -f -l 6
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET_ACCESS_KEY}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-eu-central-1}
    volumes:
      - ../../infra/scripts/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  promdata:
  grafanadata:

networks:
  internal:
    driver: bridge
